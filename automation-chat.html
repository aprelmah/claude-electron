<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
  <title>Agente — POWER-AGENT</title>
  <style>
    :root {
      --bg: #1a1a1d;
      --bg-elev: #232327;
      --bg-elev-2: #2c2c30;
      --fg: #e8e8ea;
      --fg-muted: #9a9aa0;
      --border: #34343a;
      --accent: #4a8cf7;
      --accent-fg: #fff;
      --agent-bubble: #2c2c30;
      --code-bg: #161618;
      --danger: #e57373;
      --ok: #6abf69;
      --mono: ui-monospace, SFMono-Regular, Menlo, monospace;
    }
    body.theme-light {
      --bg: #f7f7fa;
      --bg-elev: #fff;
      --bg-elev-2: #ececef;
      --fg: #1a1a1d;
      --fg-muted: #6a6a70;
      --border: #d0d0d6;
      --accent: #2563eb;
      --accent-fg: #fff;
      --agent-bubble: #ececef;
      --code-bg: #e9e9ed;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', Helvetica, Arial, sans-serif;
      font-size: 13px;
      color: var(--fg);
      background: var(--bg);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .header {
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 8px 84px;
      background: var(--bg-elev);
      border-bottom: 1px solid var(--border);
      user-select: none;
      flex: 0 0 auto;
    }
    .header h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
    }
    .header .sub {
      font-size: 11px;
      color: var(--fg-muted);
      margin-top: 1px;
    }
    .header-actions {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 6px;
    }
    .header-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      line-height: 1;
    }
    .header-btn:hover { background: var(--bg-elev-2); }

    .header-prefs {
      -webkit-app-region: no-drag;
      display: flex;
      gap: 4px;
      align-items: center;
      margin-right: 4px;
    }
    .header-prefs select {
      background: var(--bg-elev-2);
      color: var(--fg);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 11px;
      padding: 2px 4px;
      height: 22px;
      font-family: inherit;
      cursor: pointer;
      outline: none;
      max-width: 90px;
    }
    .header-prefs select:hover { border-color: var(--accent); }
    .header-prefs select:focus { border-color: var(--accent); }

    /* Messages */
    .messages {
      flex: 1 1 auto;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .row { display: flex; }
    .row.user { justify-content: flex-end; }
    .row.agent { justify-content: flex-start; }

    .bubble {
      max-width: 78%;
      padding: 8px 11px;
      border-radius: 14px;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 13px;
    }
    .row.user .bubble {
      background: var(--accent);
      color: var(--accent-fg);
      border-bottom-right-radius: 4px;
    }
    .row.agent .bubble {
      background: var(--agent-bubble);
      color: var(--fg);
      border-bottom-left-radius: 4px;
    }
    .ts {
      font-size: 10px;
      color: var(--fg-muted);
      margin-top: 3px;
      text-align: right;
    }
    .row.agent .ts { text-align: left; }

    .typing {
      display: inline-block;
      color: var(--fg-muted);
      font-size: 16px;
      line-height: 1;
      letter-spacing: 2px;
    }
    .typing::after {
      content: '...';
      animation: dots 1.2s steps(4, end) infinite;
      display: inline-block;
      overflow: hidden;
      vertical-align: bottom;
    }
    @keyframes dots {
      0%, 20% { width: 0; }
      40% { width: 0.4em; }
      60% { width: 0.8em; }
      80%, 100% { width: 1.2em; }
    }

    .proposed {
      margin-top: 6px;
      padding: 8px;
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
    }
    .proposed .title {
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--fg);
    }
    .proposed code, .proposed pre {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--fg);
      background: transparent;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .proposed .preview-pre {
      max-height: 180px;
      overflow-y: auto;
      margin: 4px 0 8px;
      padding: 6px;
      background: var(--bg);
      border-radius: 4px;
    }
    .proposed .actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .btn {
      background: var(--bg-elev-2);
      color: var(--fg);
      border: 1px solid var(--border);
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
      font-family: inherit;
    }
    .btn:hover:not(:disabled) { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: var(--accent-fg); border-color: var(--accent); }
    .btn-primary:hover:not(:disabled) { filter: brightness(1.08); }

    /* Empty state */
    .empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--fg-muted);
      text-align: center;
      gap: 6px;
      padding: 20px;
    }
    .empty .title {
      font-size: 14px;
      color: var(--fg);
      font-weight: 600;
    }

    /* Composer */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: flex-end;
      padding: 10px 12px;
      background: var(--bg-elev);
      border-top: 1px solid var(--border);
    }
    .composer-area {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      min-height: 32px;
      max-height: 160px;
      padding: 7px 9px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--fg);
      font-family: inherit;
      font-size: 13px;
      line-height: 1.4;
      outline: none;
    }
    .composer textarea:focus { border-color: var(--accent); }
    .composer .opts {
      font-size: 10px;
      color: var(--fg-muted);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .composer .opts label { cursor: pointer; user-select: none; }
    .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--accent);
      color: var(--accent-fg);
      border: none;
      font-size: 16px;
      cursor: pointer;
      flex: 0 0 auto;
    }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .toast {
      position: fixed;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%);
      padding: 8px 14px;
      background: var(--bg-elev-2);
      border: 1px solid var(--border);
      color: var(--fg);
      border-radius: 8px;
      font-size: 12px;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
      z-index: 10;
    }
    .toast.show { opacity: 1; }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .toast.ok { border-color: var(--ok); color: var(--ok); }
    .toast.warn { border-color: #d4a017; color: #d4a017; }

    /* Switch provider button */
    .switch-provider-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--fg);
      height: 22px;
      padding: 0 6px;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-family: inherit;
    }
    .switch-provider-btn:hover { background: var(--bg-elev-2); border-color: var(--accent); }

    /* Provider locked tooltip hint */
    .header-prefs select:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Provider switch modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.show { display: flex; }
    .modal {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-width: 460px;
      width: 92%;
      padding: 18px 18px 14px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }
    .modal h2 {
      margin: 0 0 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--fg);
    }
    .modal p {
      margin: 0 0 12px;
      font-size: 12px;
      color: var(--fg-muted);
      line-height: 1.5;
    }
    .modal .modal-actions {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 10px;
    }
    .modal .modal-actions .btn {
      width: 100%;
      text-align: left;
      padding: 8px 10px;
      font-size: 12px;
    }
    .modal .modal-actions .btn .hint {
      display: block;
      font-size: 10px;
      color: var(--fg-muted);
      margin-top: 2px;
    }
    .modal .modal-actions .btn:hover:not(:disabled) .hint { color: var(--accent-fg); }
    .modal .modal-cancel {
      margin-top: 8px;
      text-align: right;
    }

    /* System / provider-error message */
    .row.system { justify-content: center; }
    .row.system .bubble {
      max-width: 92%;
      background: transparent;
      border: 1px dashed var(--danger);
      color: var(--fg-muted);
      font-size: 11.5px;
      border-radius: 8px;
      padding: 8px 10px;
    }
    .row.system .err-title {
      color: var(--danger);
      font-weight: 600;
      margin-bottom: 3px;
      font-size: 11.5px;
    }
    .row.system .err-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .row.system .err-actions .btn { font-size: 10.5px; padding: 3px 8px; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <h1 id="title">Agente</h1>
      <div class="sub" id="subtitle">Cargando…</div>
    </div>
    <div class="header-right" style="-webkit-app-region: no-drag; display: flex; align-items: center; gap: 6px;">
    <div class="header-prefs">
      <select id="provider-select" title="Proveedor del agente">
        <option value="claude">Claude</option>
        <option value="codex">Codex</option>
      </select>
      <button class="switch-provider-btn" id="btn-switch-provider" title="Cambiar proveedor (perderá contexto puro)">🔄</button>
      <select id="model-select" title="Modelo del LLM">
        <option value="">Default</option>
      </select>
      <select id="effort-select" title="Razonamiento del modelo">
        <option value="">Default</option>
      </select>
    </div>
    <div class="header-actions">
      <button class="header-btn" id="btn-min" title="Minimizar">−</button>
      <button class="header-btn" id="btn-close" title="Cerrar">×</button>
    </div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="empty" id="empty">
      <div class="title">Habla con el agente</div>
      <div>Te recuerda qué creó y puede proponer cambios al script.</div>
    </div>
  </div>

  <div class="composer">
    <div class="composer-area">
      <textarea id="input" placeholder="Escribe un mensaje… (Enter envía, Shift+Enter newline)"></textarea>
      <div class="opts">
        <label><input type="checkbox" id="opt-include-log" /> Incluir log reciente</label>
      </div>
    </div>
    <button class="send-btn" id="btn-send" title="Enviar (Enter)">➤</button>
  </div>

  <div class="toast" id="toast"></div>

  <div class="modal-overlay" id="switch-modal">
    <div class="modal" role="dialog" aria-modal="true">
      <h2>Cambiar de proveedor</h2>
      <p>
        Claude y Codex tienen sesiones incompatibles. Al cambiar empezarás un thread
        nuevo en el otro proveedor. Elige cómo quieres arrancarlo:
      </p>
      <div class="modal-actions">
        <button class="btn" id="modal-with-summary">
          Cambiar con resumen
          <span class="hint">Manda como primer mensaje un resumen del thread actual.</span>
        </button>
        <button class="btn" id="modal-clean">
          Cambiar limpio
          <span class="hint">Empieza de cero, sin contexto del thread anterior.</span>
        </button>
      </div>
      <div class="modal-cancel">
        <button class="btn" id="modal-cancel">Cancelar</button>
      </div>
    </div>
  </div>

  <script src="automation-chat-renderer.js"></script>
</body>
</html>
