<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' blob:; img-src 'self' blob: data:">
  <title>POWER-AGENT</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">
  <div id="titlebar">
    <div id="drag-area"><span id="app-title">⟁ POWER-AGENT</span></div>

    <div id="actions">
      <button id="btn-mic" class="action icon-btn" title="Dictado por voz (Cmd+Shift+M)">
        <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      </button>
      <button id="btn-image" class="action icon-btn" title="Adjuntar imagen">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      </button>
      <button id="btn-file" class="action icon-btn" title="Adjuntar archivo">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
    </div>

    <div id="controls">
      <select id="cli-selector" title="Seleccionar Claude o Codex">
        <option value="claude">Claude</option>
        <option value="codex">Codex</option>
      </select>
      <button id="btn-new-window" class="icon-btn" title="Nueva ventana (Cmd+N)">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-sessions" class="icon-btn" title="Sesiones de esta carpeta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      </button>
      <button id="btn-sidebar" class="icon-btn active" title="Mostrar/ocultar explorador">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button id="btn-pin" class="icon-btn" title="Fijar siempre encima">
        <svg viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-2-6V5H7v6l-2 6z"/></svg>
      </button>
      <button id="btn-theme" class="icon-btn" title="Cambiar tema">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" fill="currentColor"/><path d="M12 3a9 9 0 0 0 0 18V3z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button id="btn-tasks" class="icon-btn" title="Tareas programadas (Cmd+Shift+T)" aria-label="Tareas">⏰</button>
      <button id="btn-settings" class="icon-btn" title="Configuracion">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1 .6 1.65 1.65 0 0 0-.33 1V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 20a1.65 1.65 0 0 0-1-.6 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-.6-1 1.65 1.65 0 0 0-1-.33H3a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 4 9a1.65 1.65 0 0 0 .6-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06A2 2 0 1 1 7.04 3.3l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-.6 1.65 1.65 0 0 0 .33-1V3a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 4a1.65 1.65 0 0 0 1 .6 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9c.2.3.5.5.84.58.34.08.69.1 1.03.09a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1 .33c-.3.2-.5.5-.58.84z"/></svg>
      </button>
      <button id="btn-send-telegram" class="icon-btn" disabled title="Llevar esta sesión a Telegram (te aviso en el móvil)" aria-label="Enviar a Telegram">📱</button>
      <button id="btn-restart" class="icon-btn" title="Reiniciar sesión Claude">
        <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button id="btn-minimize" class="icon-btn" title="Minimizar">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-close" class="icon-btn" title="Cerrar">
        <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div id="main">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title" title="">Explorador</span>
        <div class="side-actions">
          <button id="btn-work-here" class="icon-btn small" title="Reiniciar Claude en esta carpeta">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
          </button>
          <button id="btn-open-folder" class="icon-btn small" title="Abrir otra carpeta">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button id="btn-refresh-tree" class="icon-btn small" title="Recargar árbol">
            <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      <div id="tree"></div>
      <div id="cwd-bar">
        <span class="cwd-label">claude cwd:</span>
        <span id="cwd-value">—</span>
      </div>
    </aside>

    <div id="divider"></div>

    <div id="terminal-wrap">
    <div id="terminal"></div>
    <div id="drop-overlay" class="hidden">
      <div class="drop-msg">Suelta para adjuntar</div>
    </div>
    <div id="status-bar" class="hidden">
      <span id="status-text"></span>
    </div>
  </div>
  </div>

  <div id="sessions-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Sesiones</span>
        <span id="sessions-cwd" class="modal-sub"></span>
        <button id="btn-close-sessions" class="modal-close">×</button>
      </div>
      <div id="sessions-list"></div>
      <div id="sessions-empty" class="hidden">Sin sesiones para esta carpeta.</div>
    </div>
  </div>

  <div id="settings-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel settings">
      <div class="modal-header">
        <span class="modal-title">Configuracion</span>
        <span class="modal-sub">CLI local + Telegram bridge movil</span>
        <button id="btn-close-settings" class="modal-close">×</button>
      </div>
      <div class="settings-body">
        <div class="settings-group">
          <div class="settings-group-title">CLI</div>
          <label class="settings-field">
            <span>CLI por defecto</span>
            <select id="cfg-default-cli">
              <option value="claude">Claude</option>
              <option value="codex">Codex</option>
            </select>
          </label>
          <label class="settings-field">
            <span>CLAUDE_BIN</span>
            <input id="cfg-claude-bin" type="text" placeholder="/ruta/a/claude o comando" />
          </label>
          <label class="settings-field">
            <span>CODEX_BIN</span>
            <input id="cfg-codex-bin" type="text" placeholder="/ruta/a/codex o comando" />
          </label>
          <label class="settings-field">
            <span>WHISPER_BIN</span>
            <input id="cfg-whisper-bin" type="text" placeholder="/ruta/a/whisper o comando" />
          </label>
        </div>

        <div class="settings-group">
          <div class="settings-group-title">Telegram</div>
          <label class="settings-check">
            <input id="cfg-telegram-enabled" type="checkbox" />
            <span>Activar puente Telegram</span>
          </label>
          <label class="settings-field">
            <span>Bot token</span>
            <input id="cfg-telegram-token" type="password" placeholder="123456:AA..." />
          </label>
          <label class="settings-field">
            <span>Allowed users (IDs Telegram, separados por coma)</span>
            <input id="cfg-telegram-users" type="text" placeholder="12345678, 98765432" />
          </label>
          <div class="settings-row">
            <label class="settings-field">
              <span>Modelo Claude (Telegram)</span>
              <select id="cfg-telegram-claude-model">
                <option value="">Default</option>
                <option value="haiku">Haiku (barato)</option>
                <option value="sonnet">Sonnet</option>
                <option value="opus">Opus (caro)</option>
              </select>
            </label>
            <label class="settings-field">
              <span>Esfuerzo Claude</span>
              <select id="cfg-telegram-claude-effort">
                <option value="">Default</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
                <option value="xhigh">Xhigh</option>
                <option value="max">Max</option>
              </select>
            </label>
          </div>
          <div class="settings-row">
            <label class="settings-field">
              <span>Modelo Codex (Telegram)</span>
              <select id="cfg-telegram-codex-model">
                <option value="">Default (gpt-5.4-mini)</option>
                <option value="gpt-5.4-mini">gpt-5.4-mini (barato)</option>
                <option value="gpt-5.4">gpt-5.4</option>
                <option value="o3-mini">o3-mini (reasoning)</option>
                <option value="o3">o3 (reasoning caro)</option>
              </select>
            </label>
            <label class="settings-field">
              <span>Esfuerzo Codex</span>
              <select id="cfg-telegram-codex-effort">
                <option value="">Default</option>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
              </select>
            </label>
          </div>
          <div id="cfg-telegram-status" class="settings-note">Estado: -</div>
        </div>
      </div>
      <div class="settings-actions">
        <button id="btn-refresh-telegram-status" class="icon-btn text-btn">Refrescar estado</button>
        <button id="btn-save-settings" class="icon-btn text-btn primary">Guardar configuracion</button>
      </div>
    </div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
