<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; media-src 'self' blob:; img-src 'self' blob: data:">
  <title>CLAUDE-NOVAK</title>
  <link rel="stylesheet" href="node_modules/@xterm/xterm/css/xterm.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="dark">
  <div id="titlebar">
    <div id="drag-area"><span id="app-title">⟁ CLAUDE-NOVAK</span></div>

    <div id="actions">
      <button id="btn-mic" class="action icon-btn" title="Dictado por voz (Cmd+Shift+M)">
        <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 1 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      </button>
      <button id="btn-image" class="action icon-btn" title="Adjuntar imagen">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
      </button>
      <button id="btn-file" class="action icon-btn" title="Adjuntar archivo">
        <svg viewBox="0 0 24 24"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
      </button>
    </div>

    <div id="controls">
      <select id="cli-selector" title="Seleccionar Claude o Codex">
        <option value="claude">Claude</option>
        <option value="codex">Codex</option>
      </select>
      <button id="btn-sessions" class="icon-btn" title="Sesiones de esta carpeta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
      </button>
      <button id="btn-sidebar" class="icon-btn active" title="Mostrar/ocultar explorador">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="9" y1="3" x2="9" y2="21"/></svg>
      </button>
      <button id="btn-pin" class="icon-btn active" title="Fijar siempre encima">
        <svg viewBox="0 0 24 24"><line x1="12" y1="17" x2="12" y2="22"/><path d="M5 17h14l-2-6V5H7v6l-2 6z"/></svg>
      </button>
      <button id="btn-theme" class="icon-btn" title="Cambiar tema">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 3v18" fill="currentColor"/><path d="M12 3a9 9 0 0 0 0 18V3z" fill="currentColor" stroke="none"/></svg>
      </button>
      <button id="btn-restart" class="icon-btn" title="Reiniciar sesión Claude">
        <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
      </button>
      <button id="btn-minimize" class="icon-btn" title="Minimizar">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <button id="btn-close" class="icon-btn" title="Cerrar">
        <svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>
      </button>
    </div>
  </div>

  <div id="main">
    <aside id="sidebar">
      <div id="sidebar-header">
        <span id="sidebar-title" title="">Explorador</span>
        <div class="side-actions">
          <button id="btn-work-here" class="icon-btn small" title="Reiniciar Claude en esta carpeta">
            <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
          </button>
          <button id="btn-open-folder" class="icon-btn small" title="Abrir otra carpeta">
            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </button>
          <button id="btn-refresh-tree" class="icon-btn small" title="Recargar árbol">
            <svg viewBox="0 0 24 24"><polyline points="23,4 23,10 17,10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          </button>
        </div>
      </div>
      <div id="tree"></div>
      <div id="cwd-bar">
        <span class="cwd-label">claude cwd:</span>
        <span id="cwd-value">—</span>
      </div>
    </aside>

    <div id="divider"></div>

    <div id="terminal-wrap">
    <div id="terminal"></div>
    <div id="drop-overlay" class="hidden">
      <div class="drop-msg">Suelta para adjuntar</div>
    </div>
    <div id="status-bar" class="hidden">
      <span id="status-text"></span>
    </div>
  </div>
  </div>

  <div id="viewer-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel large">
      <div class="modal-header">
        <span id="viewer-name" class="modal-title">archivo</span>
        <span id="viewer-meta" class="modal-sub"></span>
        <div class="viewer-actions">
          <button id="btn-viewer-send" class="icon-btn small" title="Enviar @path a Claude">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22,2 15,22 11,13 2,9" fill="currentColor"/></svg>
          </button>
          <button id="btn-viewer-save" class="icon-btn small" title="Guardar (Cmd+S)" disabled>
            <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
          </button>
          <button id="btn-viewer-close" class="modal-close" title="Cerrar (Esc)">×</button>
        </div>
      </div>
      <div id="viewer-body"></div>
    </div>
  </div>

  <div id="sessions-modal" class="hidden">
    <div class="modal-backdrop"></div>
    <div class="modal-panel">
      <div class="modal-header">
        <span class="modal-title">Sesiones</span>
        <span id="sessions-cwd" class="modal-sub"></span>
        <button id="btn-close-sessions" class="modal-close">×</button>
      </div>
      <div id="sessions-list"></div>
      <div id="sessions-empty" class="hidden">Sin sesiones para esta carpeta.</div>
    </div>
  </div>

  <script src="node_modules/@xterm/xterm/lib/xterm.js"></script>
  <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
  <script src="node_modules/@xterm/addon-web-links/lib/addon-web-links.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
